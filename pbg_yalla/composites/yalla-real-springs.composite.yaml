name: yalla-real-springs
description: "Pair-wise spring relaxation driven by the REAL ya||a GPU solver (requires CUDA + an NVIDIA GPU). Generates a .cu model, compiles it with nvcc against a ya||a checkout, and round-trips agent state through the compiled binary each step. On a CPU/macOS host this raises YallaCudaUnavailable — use yalla-springs-demo (reproduction) instead."
tags: [cells, mechanics, demo, yalla, requires-cuda]

requires:
  processes: [YallaProcess, RAMEmitter]

parameters:
  n_cells:
    type: int
    default: 200
    description: "Number of agents in the random sphere (fixed population)."
  force_kernel:
    type: string
    default: "spring"
    description: "Native ya||a force kernel: spring, differential_adhesion, or relu."
  dt:
    type: float
    default: 0.001
    description: "ya||a integrator step size (matches the springs.cu example)."
  interval:
    type: float
    default: 0.05
    description: "Process interval; the binary runs round(interval/dt) take_step calls."
  seed:
    type: int
    default: 1
    description: "RNG seed for the initial sphere (built in NumPy, then handed to ya||a)."
  cuda_arch:
    type: string
    default: "sm_60"
    description: "nvcc target architecture; set to match your GPU (e.g. sm_70, sm_80)."

state:
  yalla:
    _type: process
    address: "local:YallaProcess"
    config:
      n_cells: "${n_cells}"
      force_kernel: "${force_kernel}"
      dt: "${dt}"
      seed: "${seed}"
      cuda_arch: "${cuda_arch}"
      init: "random_sphere"
      init_dist: 0.5
      L_0: 0.5
    inputs: {}
    outputs:
      n_cells: ["stores", "n_cells"]
      gyration_radius: ["stores", "gyration_radius"]
      mean_neighbor_distance: ["stores", "mean_neighbor_distance"]
      sorting_score: ["stores", "sorting_score"]
      type_radial_spread: ["stores", "type_radial_spread"]
      center_x: ["stores", "center_x"]
      center_y: ["stores", "center_y"]
      center_z: ["stores", "center_z"]
    interval: "${interval}"
  stores:
    n_cells: 0
    gyration_radius: 0.0
    mean_neighbor_distance: 0.0
    sorting_score: 0.0
    type_radial_spread: 0.0
    center_x: 0.0
    center_y: 0.0
    center_z: 0.0
  emitter:
    _type: step
    address: "local:RAMEmitter"
    config:
      emit:
        n_cells: "integer"
        gyration_radius: "float"
        mean_neighbor_distance: "float"
        sorting_score: "float"
        type_radial_spread: "float"
        time: "float"
    inputs:
      n_cells: ["stores", "n_cells"]
      gyration_radius: ["stores", "gyration_radius"]
      mean_neighbor_distance: ["stores", "mean_neighbor_distance"]
      sorting_score: ["stores", "sorting_score"]
      type_radial_spread: ["stores", "type_radial_spread"]
      time: ["global_time"]
